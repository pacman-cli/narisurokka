# ===========================================
# AUTH SERVICE CONFIGURATION
# ===========================================
spring.application.name=auth-service
server.port=8081

# ===========================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/narisurokkha_auth
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===========================================
# REDIS CONFIGURATION
# ===========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

# ===========================================
# JWT CONFIGURATION
# ===========================================
jwt.secret=${JWT_SECRET:defaultDevSecretKeyThatShouldNeverBeUsedInProduction12345}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ===========================================
# KAFKA CONFIGURATION
# ===========================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Custom Auth Kafka settings
auth.kafka.topic=auth.events

# ===========================================
# LOGGING CONFIGURATION
# ===========================================
logging.level.org.example.authservice=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ===========================================
# ACTUATOR / HEALTH ENDPOINTS
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
