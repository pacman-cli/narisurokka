# ===========================================
# SOS SERVICE CONFIGURATION
# ===========================================
spring.application.name=sos-service
server.port=8082

# ===========================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/narisurokkha_sos
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===========================================
# REDIS CONFIGURATION
# ===========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

# ===========================================
# KAFKA CONFIGURATION
# ===========================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Custom SOS Kafka settings
sos.kafka.topic=sos.events

# ===========================================
# RESILIENCE4J CIRCUIT BREAKER
# ===========================================
resilience4j.circuitbreaker.instances.sosService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.sosService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.sosService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.sosService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.sosService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.sosService.failureRateThreshold=50

# ===========================================
# LOGGING CONFIGURATION
# ===========================================
logging.level.org.example.sosservice=DEBUG
logging.level.org.springframework.kafka=WARN
logging.level.org.springframework.data.redis=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ===========================================
# ACTUATOR / HEALTH ENDPOINTS
# ===========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
